name: Build & Deploy to Hostinger

on:
  push:
    branches:
      - main        # auto-deploy when you merge to main
  workflow_dispatch: # allow manual trigger from GitHub Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        working-directory: website
        run: npm install

      - name: Build app
        working-directory: website/apps/web
        env:
          VITE_POCKETBASE_URL: ${{ secrets.VITE_POCKETBASE_URL }}
        run: npx vite build --outDir ../../dist/apps/web

      - name: Verify build output
        run: ls -la website/dist/apps/web/

      - name: Deploy to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: website/dist/apps/web/
          server-dir: public_html/
          dangerous-clean-slate: true
