name: Build & Deploy to Hostinger

on:
  push:
    branches:
      - main
      - claude/quirky-gates-MZhWI
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        working-directory: website
        run: npm install

      - name: Build app
        working-directory: website/apps/web
        env:
          VITE_POCKETBASE_URL: ${{ secrets.VITE_POCKETBASE_URL }}
        run: npx vite build --outDir ../../dist/apps/web

      - name: List build output
        run: ls -la website/dist/apps/web/

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via FTP
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -c "
            set ftp:ssl-allow no;
            set ssl:verify-certificate no;
            open ftp://$FTP_USERNAME:$FTP_PASSWORD@$FTP_SERVER;
            mirror --reverse --delete --verbose --no-perms \
              website/dist/apps/web/ \
              public_html/;
            quit
          "
